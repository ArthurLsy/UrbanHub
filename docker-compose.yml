services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: urbanhub-timescaledb
    environment:
      POSTGRES_DB: urbanhub
      POSTGRES_USER: urbanhub
      POSTGRES_PASSWORD: urbanhub
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanhub -d urbanhub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
