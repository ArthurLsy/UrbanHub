services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: urbanhub-db
    environment:
      POSTGRES_DB: urbanhub
      POSTGRES_USER: urbanhub
      POSTGRES_PASSWORD: urbanhub
    ports:
      - "5432:5432"
    volumes:
      - urbanhub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U urbanhub -d urbanhub -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urbanhub-backend
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/urbanhub
      SPRING_DATASOURCE_USERNAME: urbanhub
      SPRING_DATASOURCE_PASSWORD: urbanhub
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    command: ./gradlew bootRun --no-daemon
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
    container_name: urbanhub-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  sonarqube:
    image: sonarqube:community
    container_name: urbanhub-sonarqube
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/api/system/health || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

volumes:
  urbanhub-db-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
