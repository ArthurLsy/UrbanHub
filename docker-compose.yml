services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: urbanhub-db
    environment:
      POSTGRES_DB: urbanhub
      POSTGRES_USER: urbanhub
      POSTGRES_PASSWORD: urbanhub
    ports:
      - "5432:5432"
    volumes:
      - urbanhub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U urbanhub -d urbanhub -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  urbanhub-db-data: