deploy_job:
  stage: deploy
  image: alpine:latest
  before_script:
    # C'est cette ligne qui manque à votre conteneur Alpine
    - apk update && apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p 7818 $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh -p 7818 $SERVER_USER@$SERVER_IP "cd /home/user/UrbanHub && git pull origin dev"
  only:
    - dev
