name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: urbanhub-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: eu-west-3
  AWS_ROLE_ARN: arn:aws:iam::627403012708:role/urbanhub/role-urbanhub-ci
  ECR_REPOSITORY: urbanhub-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew assemble --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Tests + couverture
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Publier les résultats de tests
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "build/test-results/test/TEST-*.xml"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-and-coverage-reports
          path: |
            build/reports/tests/test/
            build/reports/jacoco/
          retention-days: 7

  quality:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-cache-${{ runner.os }}

      - name: Analyse SonarQube
        run: |
          ./gradlew sonarqube --no-daemon \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy (rapport complet, non bloquant)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Trivy (gate bloquant sur CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"

  package:
    runs-on: ubuntu-latest
    needs: [test, quality, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      security-events: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build de l'image de production
        run: |
          docker build -f Dockerfile.prod \
            -t "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" \
            -t "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" \
            .

      - name: Scan de l'image (rapport complet, non bloquant)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          format: sarif
          output: trivy-image-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Scan de l'image (gate bloquant sur CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Publication sur ECR
        run: |
          docker push "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker push "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "### Image publiée" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Déploiement via SSM
        run: |
          set -euo pipefail

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=urbanhub" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::Aucune instance EC2 running taguée Project=urbanhub trouvée. L'infra a-t-elle été appliquée (infra/terraform/app) ?"
            exit 1
          fi
          echo "Instance cible : $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/opt/urbanhub/redeploy.sh"]' \
            --query "Command.CommandId" --output text)
          echo "Commande SSM : $COMMAND_ID"

          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Statut ($i/24) : $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text
                echo "::error::Redéploiement échoué (statut SSM: $STATUS)"
                exit 1
                ;;
            esac
            sleep 5
          done

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Timeout en attendant la fin du redéploiement (dernier statut: $STATUS)"
            exit 1
          fi

          echo "### Déploiement réussi" >> "$GITHUB_STEP_SUMMARY"
          echo "Instance : \`$INSTANCE_ID\` — Commande SSM : \`$COMMAND_ID\`" >> "$GITHUB_STEP_SUMMARY"
