spring.application.name=UrbanHub

# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL / TimescaleDB — Local (Docker)
# docker-compose up -d  →  localhost:5432, db=urbanhub
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/urbanhub
spring.datasource.username=urbanhub
spring.datasource.password=urbanhub
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ddl-auto=update : Hibernate crée/met à jour les tables automatiquement (dev)
# À passer en validate ou none en production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
